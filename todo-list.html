<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日 To Do List</title>
  <style>
    :root {
      --bg: #f7f4ed;
      --panel: #ffffff;
      --text: #171717;
      --muted: #555555;
      --line: #171717;
      --soft: #f1eee7;
      --primary: #111111;
      --primary-dark: #000000;
      --green: #2f8f5b;
      --red: #d63b45;
      --orange: #e8a526;
      --accent: #ffdf58;
      --shadow: 7px 7px 0 #171717;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 24px 14px;
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle, rgba(23, 23, 23, 0.13) 1px, transparent 1.5px) 0 0 / 16px 16px,
        linear-gradient(135deg, rgba(255, 223, 88, 0.34), transparent 36%),
        var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .app {
      width: min(980px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .controls {
      order: 2;
    }

    .list-panel {
      order: 3;
    }

    .history {
      order: 4;
    }

    .app.confirmed .list-panel {
      order: 2;
    }

    .app.confirmed .controls {
      order: 3;
    }

    .panel {
      border: 3px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel,
    .todo,
    .day-card {
      position: relative;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 8px;
      border: 1px dashed rgba(23, 23, 23, 0.18);
      pointer-events: none;
    }

    .header {
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
    }

    h1,
    h2 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      display: inline-block;
      padding: 6px 10px;
      border: 3px solid var(--line);
      background: var(--accent);
      box-shadow: 4px 4px 0 var(--line);
      font-size: 30px;
      line-height: 1.15;
      text-transform: uppercase;
    }

    h2 {
      font-size: 18px;
    }

    .subtle {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .header .subtle {
      max-width: 560px;
    }

    .today {
      min-width: 210px;
      padding: 14px 16px;
      border-radius: 16px;
      color: #ffffff;
      background: #182235;
      text-align: right;
      border: 3px solid var(--line);
      box-shadow: 4px 4px 0 var(--accent);
    }

    .today span {
      display: block;
      color: rgba(255, 255, 255, 0.72);
      font-size: 13px;
    }

    .today strong {
      display: block;
      margin-top: 5px;
      font-size: 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 0 24px 24px;
    }

    .stat {
      padding: 14px;
      border-radius: 14px;
      background: var(--soft);
      border: 2px solid var(--line);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-size: 24px;
    }

    .progress {
      height: 8px;
      overflow: hidden;
      margin: 0 24px 24px;
      border-radius: 999px;
      background: var(--soft);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary), var(--green), var(--orange));
      transition: width 0.25s ease;
    }

    .controls {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .control-row {
      display: grid;
      grid-template-columns: 180px 1fr 130px 120px auto;
      gap: 12px;
      align-items: end;
    }

    .date-tools {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .date-input,
    .duration-input,
    .amount-input,
    .task-input {
      width: 100%;
      height: 46px;
      border: 2px solid var(--line);
      border-radius: 8px;
      outline: 0;
      padding: 0 13px;
      color: var(--text);
      background: #fbfcff;
    }

    .segmented,
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .segment,
    .filter {
      height: 36px;
      padding: 0 13px;
      border: 2px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: var(--soft);
    }

    .segment.active,
    .filter.active {
      color: #ffffff;
      background: var(--text);
      box-shadow: 3px 3px 0 var(--accent);
    }

    .add-btn {
      height: 46px;
      padding: 0 18px;
      border: 2px solid var(--line);
      border-radius: 8px;
      color: #ffffff;
      background: var(--primary);
      box-shadow: 4px 4px 0 var(--accent);
      white-space: nowrap;
    }

    .add-btn:hover {
      background: var(--primary-dark);
    }

    .confirm-btn {
      height: 40px;
      padding: 0 14px;
      border: 2px solid var(--line);
      border-radius: 8px;
      color: #ffffff;
      background: var(--green);
      white-space: nowrap;
    }

    .confirm-btn:hover {
      background: #188a65;
    }

    .today-btn {
      height: 46px;
      padding: 0 13px;
      border-radius: 12px;
      color: var(--primary-dark);
      background: var(--accent);
      white-space: nowrap;
    }

    .today-btn:hover {
      background: #f5ce36;
    }

    .type-hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .setup-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .setup-title {
      display: grid;
      gap: 4px;
    }

    .setup-title strong {
      font-size: 16px;
    }

    .setup-title span {
      color: var(--muted);
      font-size: 13px;
    }

    .list-panel {
      padding: 18px;
    }

    .list-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .list-head h2,
    .history-head h2 {
      display: inline-block;
      padding-bottom: 3px;
      border-bottom: 4px solid var(--accent);
    }

    .clear-btn {
      height: 36px;
      padding: 0 12px;
      border: 2px solid var(--line);
      border-radius: 8px;
      color: var(--red);
      background: #fff0f1;
      white-space: nowrap;
    }

    .list {
      display: grid;
      gap: 10px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .todo {
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      gap: 12px;
      align-items: center;
      min-height: 58px;
      padding: 10px 12px;
      border: 3px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 4px 4px 0 rgba(23, 23, 23, 0.16);
    }

    .todo-index {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 2px solid var(--line);
      border-radius: 50%;
      background: var(--accent);
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
    }

    .check {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 2px solid var(--line);
      border-radius: 50%;
      color: transparent;
      background: #ffffff;
    }

    .todo.done .check {
      border-color: var(--green);
      color: #ffffff;
      background: var(--green);
    }

    .todo-main {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .todo-text {
      overflow-wrap: anywhere;
      line-height: 1.45;
    }

    .todo-title-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .todo-duration {
      flex: 0 0 auto;
      padding: 3px 8px;
      border: 2px solid var(--line);
      border-radius: 999px;
      background: #fff8d7;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .todo.done .todo-text {
      color: var(--muted);
      text-decoration: line-through;
    }

    .todo.done {
      background:
        repeating-linear-gradient(-45deg, rgba(23, 23, 23, 0.04), rgba(23, 23, 23, 0.04) 4px, transparent 4px, transparent 9px),
        #ffffff;
    }

    .todo-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .task-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .summary-chip {
      padding: 5px 9px;
      border: 2px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      background: #ffffff;
      font-weight: 700;
    }

    .pill {
      padding: 2px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--soft);
    }

    .pill.daily {
      color: #176c52;
      background: #e8f7f1;
    }

    .pill.once {
      color: #8a5a13;
      background: #fff3dd;
    }

    .delete {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      color: #9aa6b8;
      background: transparent;
      font-size: 22px;
      line-height: 1;
    }

    .delete:hover {
      color: var(--red);
      background: #fff0f1;
    }

    .empty {
      display: none;
      padding: 42px 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
    }

    .empty strong {
      display: block;
      color: var(--text);
      font-size: 20px;
    }

    .history {
      padding: 18px;
    }

    .history-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: end;
      margin-bottom: 12px;
    }

    .history-note {
      color: var(--muted);
      font-size: 13px;
    }

    .history-list {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day-card {
      min-height: 92px;
      padding: 10px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .day-card.flower {
      box-shadow: 4px 4px 0 #e63b45;
    }

    .day-card.sweat {
      box-shadow: 4px 4px 0 #76b7ff;
    }

    .day-card.rest {
      color: #444444;
      background:
        repeating-linear-gradient(-45deg, rgba(23, 23, 23, 0.045), rgba(23, 23, 23, 0.045) 4px, transparent 4px, transparent 10px),
        #f7f7f7;
    }

    .day-card:nth-child(odd) {
      background:
        radial-gradient(circle, rgba(23, 23, 23, 0.08) 1px, transparent 1.5px) 0 0 / 10px 10px,
        #ffffff;
    }

    .day-date {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
    }

    .today-badge {
      padding: 1px 6px;
      border-radius: 999px;
      color: #176c52;
      background: #e8f7f1;
      font-size: 11px;
    }

    .day-rate {
      margin-top: 8px;
      color: var(--primary);
      font-size: 18px;
      font-weight: 800;
    }

    .reward-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 26px;
      margin-top: 9px;
      padding: 4px 8px;
      border: 2px solid var(--line);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      transform: rotate(-2deg);
    }

    .reward-badge.flower {
      color: #ffffff;
      background: #e63b45;
      box-shadow: 3px 3px 0 var(--line);
    }

    .reward-badge.sweat {
      color: #111111;
      background: #dff0ff;
      box-shadow: 3px 3px 0 #76b7ff;
    }

    .reward-badge.rest {
      color: #444444;
      background: #f3f3f3;
      border-style: dashed;
      box-shadow: 3px 3px 0 rgba(23, 23, 23, 0.18);
    }

    .reward-mark {
      display: inline-grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border: 2px solid currentColor;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      font-size: 13px;
      line-height: 1;
    }

    .mini-stats {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .mini-progress {
      height: 6px;
      overflow: hidden;
      margin-top: 8px;
      border-radius: 999px;
      background: var(--soft);
    }

    .mini-progress span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--green);
    }

    @media (max-width: 820px) {
      .header,
      .control-row,
      .list-head {
        grid-template-columns: 1fr;
      }

      .header {
        display: grid;
      }

      .today {
        min-width: 0;
        text-align: left;
      }

      .stats {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .history-list {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 821px) and (max-width: 1080px) {
      .control-row {
        grid-template-columns: 180px 1fr 130px;
      }

      .control-row form {
        grid-column: 3;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 12px;
      }

      .header,
      .controls,
      .list-panel,
      .history {
        padding: 14px;
      }

      .stats {
        padding: 0 14px 14px;
      }

      .progress {
        margin: 0 14px 14px;
      }

      h1 {
        font-size: 26px;
      }

      .stats,
      .history-list {
        grid-template-columns: 1fr;
      }

      .todo {
        grid-template-columns: auto auto 1fr;
      }

      .todo .delete {
        grid-column: 3;
        justify-self: end;
      }

      .todo-title-row {
        align-items: flex-start;
        flex-direction: column;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <section class="app" id="app" aria-label="每日 To Do List">
    <header class="panel">
      <div class="header">
        <div>
          <h1>每日 To Do List</h1>
          <p class="subtle">重复任务每天出现，当天任务只属于选中的日期。</p>
        </div>
        <div class="today">
          <span>当前日期</span>
          <strong id="selectedDateText"></strong>
        </div>
      </div>

      <div class="stats" aria-label="当天任务统计">
        <div class="stat">
          <span>总任务</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="stat">
          <span>已完成</span>
          <strong id="doneCount">0</strong>
        </div>
        <div class="stat">
          <span>未完成</span>
          <strong id="leftCount">0</strong>
        </div>
      </div>

      <div class="progress" aria-label="完成进度">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </header>

    <section class="panel controls" aria-label="添加任务">
      <div class="setup-head">
        <div class="setup-title">
          <strong id="setupTitle">确认今日任务</strong>
          <span id="setupSubtitle">先补充或确认今天要做的事，确认后这里会移动到任务列表后面。</span>
        </div>
        <button class="confirm-btn" id="confirmDay" type="button">确认任务</button>
      </div>

      <div class="control-row">
        <div class="field">
          <label for="selectedDate">任务日期</label>
          <div class="date-tools">
            <input class="date-input" id="selectedDate" type="date" />
            <button class="today-btn" id="goToday" type="button">今天</button>
          </div>
        </div>

        <div class="field">
          <label for="todoInput">新任务</label>
          <input class="task-input" id="todoInput" type="text" placeholder="写下一个任务..." autocomplete="off" form="todoForm" />
        </div>

        <div class="field">
          <label for="durationInput">预计时长</label>
          <input class="duration-input" id="durationInput" type="text" placeholder="如 30 分钟" form="todoForm" />
        </div>

        <div class="field">
          <label for="amountInput">任务量</label>
          <input class="amount-input" id="amountInput" type="text" placeholder="如 3 页 / 20 个" form="todoForm" />
        </div>

        <form id="todoForm">
          <button class="add-btn" type="submit">添加任务</button>
        </form>
      </div>

      <div class="segmented" aria-label="任务类型">
        <button class="segment active" type="button" data-type="daily">每天重复</button>
        <button class="segment" type="button" data-type="once">当天任务</button>
      </div>
      <div class="type-hint" id="typeHint">每天重复任务会出现在每一天，完成状态按日期单独记录。</div>
    </section>

    <section class="panel list-panel" aria-label="任务列表">
      <div class="list-head">
        <div>
          <h2 id="listTitle">今天的任务</h2>
          <p class="subtle">点击圆圈切换完成状态。</p>
        </div>

        <div class="filters" aria-label="任务筛选">
          <button class="filter active" type="button" data-filter="all">全部</button>
          <button class="filter" type="button" data-filter="active">未完成</button>
          <button class="filter" type="button" data-filter="done">已完成</button>
          <button class="clear-btn" id="clearDone" type="button">清除完成</button>
        </div>
      </div>

      <div class="task-summary" id="taskSummary"></div>
      <ul class="list" id="todoList"></ul>

      <div class="empty" id="emptyState">
        <strong>这一天还没有任务</strong>
        添加一个重复任务或当天任务，开始安排。
      </div>
    </section>

    <section class="panel history" aria-label="最近 7 天完成情况">
      <div class="history-head">
        <h2>最近 7 天</h2>
        <span class="history-note">仅统计已确认日期的当天任务</span>
      </div>
      <div class="history-list" id="historyList"></div>
    </section>
  </section>

  <script>
    const STORAGE_KEY = "pretty-todo-list-v2";
    const LEGACY_KEY = "pretty-todo-list";

    const app = document.querySelector("#app");
    const form = document.querySelector("#todoForm");
    const input = document.querySelector("#todoInput");
    const durationInput = document.querySelector("#durationInput");
    const amountInput = document.querySelector("#amountInput");
    const selectedDateInput = document.querySelector("#selectedDate");
    const list = document.querySelector("#todoList");
    const emptyState = document.querySelector("#emptyState");
    const filterButtons = document.querySelectorAll(".filter");
    const typeButtons = document.querySelectorAll(".segment");
    const totalCount = document.querySelector("#totalCount");
    const doneCount = document.querySelector("#doneCount");
    const leftCount = document.querySelector("#leftCount");
    const progressBar = document.querySelector("#progressBar");
    const clearDone = document.querySelector("#clearDone");
    const goToday = document.querySelector("#goToday");
    const confirmDay = document.querySelector("#confirmDay");
    const setupTitle = document.querySelector("#setupTitle");
    const setupSubtitle = document.querySelector("#setupSubtitle");
    const selectedDateText = document.querySelector("#selectedDateText");
    const listTitle = document.querySelector("#listTitle");
    const taskSummary = document.querySelector("#taskSummary");
    const historyList = document.querySelector("#historyList");
    const typeHint = document.querySelector("#typeHint");

    let currentFilter = "all";
    let currentType = "daily";
    const todayKey = toDateKey(new Date());
    let selectedDate = todayKey;
    let data = loadData();

    selectedDateInput.value = selectedDate;

    function readStorage(key) {
      try {
        return JSON.parse(localStorage.getItem(key) || "null");
      } catch (error) {
        console.warn("无法读取本地任务数据，已使用默认数据。", error);
        return null;
      }
    }

    function loadData() {
      const saved = readStorage(STORAGE_KEY);
      if (saved && Array.isArray(saved.tasks)) {
        return {
          tasks: saved.tasks,
          completions: saved.completions && typeof saved.completions === "object" ? saved.completions : {},
          confirmations: saved.confirmations && typeof saved.confirmations === "object" ? saved.confirmations : {}
        };
      }

      const legacy = readStorage(LEGACY_KEY);
      if (Array.isArray(legacy) && legacy.length) {
        const migratedTasks = legacy.map((todo) => ({
          id: todo.id || makeId(),
          text: todo.text || "未命名任务",
          type: "once",
          date: todayKey,
          createdAt: todayKey,
          done: Boolean(todo.done)
        }));

        return {
          tasks: migratedTasks.map(({ done, ...task }) => task),
          completions: {
            [todayKey]: Object.fromEntries(migratedTasks.filter((todo) => todo.done).map((todo) => [todo.id, true]))
          },
          confirmations: {}
        };
      }

      return {
        tasks: [
          { id: makeId(), text: "整理今天最重要的 3 件事", type: "daily", createdAt: todayKey },
          { id: makeId(), text: "喝水、活动 5 分钟", type: "daily", createdAt: todayKey },
          { id: makeId(), text: "晚上复盘 5 分钟", type: "once", date: todayKey, createdAt: todayKey }
        ],
        completions: {},
        confirmations: {}
      };
    }

    function save() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (error) {
        console.warn("任务已显示，但浏览器暂时无法保存到本地。", error);
      }
    }

    function makeId() {
      if (globalThis.crypto && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function toDateKey(date) {
      const local = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 10);
    }

    function addDays(dateKey, offset) {
      const date = new Date(`${dateKey}T00:00:00`);
      date.setDate(date.getDate() + offset);
      return toDateKey(date);
    }

    function formatDate(dateKey, mode = "short") {
      const date = new Date(`${dateKey}T00:00:00`);
      return new Intl.DateTimeFormat("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        weekday: mode === "long" ? "long" : undefined
      }).format(date);
    }

    function tasksForDate(dateKey) {
      return data.tasks.filter((task) => task.type === "daily" || task.date === dateKey);
    }

    function isDone(task, dateKey) {
      return Boolean(data.completions[dateKey] && data.completions[dateKey][task.id]);
    }

    function setDone(taskId, dateKey, done) {
      data.completions[dateKey] = data.completions[dateKey] || {};
      if (done) {
        data.completions[dateKey][taskId] = true;
      } else {
        delete data.completions[dateKey][taskId];
      }
    }

    function dayStats(dateKey) {
      const tasks = tasksForDate(dateKey);
      const done = tasks.filter((task) => isDone(task, dateKey)).length;
      return { total: tasks.length, done, left: tasks.length - done };
    }

    function confirmedDayStats(dateKey) {
      const tasks = data.tasks.filter((task) => task.type === "once" && task.date === dateKey);
      const done = tasks.filter((task) => isDone(task, dateKey)).length;
      return { total: tasks.length, done, left: tasks.length - done };
    }

    function isConfirmed(dateKey) {
      return Boolean(data.confirmations && data.confirmations[dateKey]);
    }

    function confirmDate(dateKey) {
      data.confirmations = data.confirmations || {};
      data.confirmations[dateKey] = new Date().toISOString();
    }

    function visibleTodos() {
      const items = tasksForDate(selectedDate).map((task) => ({
        ...task,
        done: isDone(task, selectedDate)
      }));

      if (currentFilter === "active") return items.filter((todo) => !todo.done);
      if (currentFilter === "done") return items.filter((todo) => todo.done);
      return items;
    }

    function setActiveFilter(filter) {
      currentFilter = filter;
      filterButtons.forEach((item) => {
        item.classList.toggle("active", item.dataset.filter === filter);
      });
    }

    function render() {
      const stats = dayStats(selectedDate);
      const items = visibleTodos();
      const completion = stats.total ? Math.round((stats.done / stats.total) * 100) : 0;
      const selectedText = selectedDate === todayKey ? `今天 ${selectedDate}` : selectedDate;
      const confirmed = isConfirmed(selectedDate);

      app.classList.toggle("confirmed", confirmed);
      selectedDateInput.value = selectedDate;
      goToday.hidden = selectedDate === todayKey;
      selectedDateText.textContent = selectedText;
      listTitle.textContent = selectedDate === todayKey ? "今天的任务" : `${formatDate(selectedDate, "long")} 的任务`;
      setupTitle.textContent = confirmed ? "追加任务" : selectedDate === todayKey ? "确认今日任务" : "确认这一天的任务";
      setupSubtitle.textContent = confirmed ? "新的任务会继续加入当前日期。" : "先补充或确认要做的事，确认后这里会移动到任务列表后面。";
      confirmDay.hidden = confirmed;
      totalCount.textContent = stats.total;
      doneCount.textContent = stats.done;
      leftCount.textContent = stats.left;
      progressBar.style.width = `${completion}%`;
      taskSummary.innerHTML = renderDurationSummary(tasksForDate(selectedDate));

      list.innerHTML = items.map((todo, index) => `
        <li class="todo ${todo.done ? "done" : ""}" data-id="${todo.id}">
          <span class="todo-index">${index + 1}</span>
          <button class="check" type="button" aria-label="切换完成状态">✓</button>
          <div class="todo-main">
            <span class="todo-title-row">
              <span class="todo-text">${escapeHtml(todo.text)}</span>
              ${taskDuration(todo) ? `<span class="todo-duration">${escapeHtml(taskDuration(todo))}</span>` : ""}
            </span>
            <span class="todo-meta">
              <span class="pill ${todo.type === "daily" ? "daily" : "once"}">${todo.type === "daily" ? "每天重复" : "当天任务"}</span>
              <span class="pill">${todo.type === "daily" ? "每日统计" : escapeHtml(todo.date)}</span>
              ${todo.amount ? `<span class="pill">任务量 ${escapeHtml(String(todo.amount))}</span>` : ""}
            </span>
          </div>
          <button class="delete" type="button" aria-label="删除任务">×</button>
        </li>
      `).join("");

      emptyState.style.display = items.length ? "none" : "block";
      renderHistory();
    }

    function renderHistory() {
      const days = Array.from({ length: 7 }, (_, index) => addDays(selectedDate, -index))
        .filter((dateKey) => isConfirmed(dateKey));

      if (!days.length) {
        historyList.innerHTML = `
          <article class="day-card rest">
            <div class="day-date">
              <span>暂无记录</span>
            </div>
            <div class="reward-badge rest">
              <span class="reward-mark">休</span>
              <span>确认后显示</span>
            </div>
            <div class="mini-stats">确认某一天的任务后，这里会显示当天任务统计。</div>
          </article>
        `;
        return;
      }

      historyList.innerHTML = days.map((dateKey) => {
        const stats = confirmedDayStats(dateKey);
        const rate = stats.total ? Math.round((stats.done / stats.total) * 100) : 0;
        const doneText = `完成 ${stats.done}`;
        const leftText = `未完成 ${stats.left}`;
        const status = historyStatus(stats);
        const reward = historyReward(status);

        return `
          <article class="day-card ${status}">
            <div class="day-date">
              <span>${formatDate(dateKey)}</span>
              ${dateKey === todayKey ? '<span class="today-badge">今天</span>' : ''}
            </div>
            <div class="day-rate">${rate}%</div>
            <div class="reward-badge ${status}">
              <span class="reward-mark">${reward.mark}</span>
              <span>${reward.label}</span>
            </div>
            <div class="mini-stats">${doneText}<br />${leftText}</div>
            <div class="mini-progress"><span style="width: ${rate}%"></span></div>
          </article>
        `;
      }).join("");
    }

    function historyStatus(stats) {
      if (stats.total === 0) return "rest";
      if (stats.left === 0) return "flower";
      return "sweat";
    }

    function historyReward(status) {
      const rewards = {
        flower: { mark: "✿", label: "小红花" },
        sweat: { mark: "💧", label: "还差一点" },
        rest: { mark: "休", label: "休息章" }
      };

      return rewards[status];
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function taskDuration(todo) {
      return todo.duration || todo.estimate || "";
    }

    function renderDurationSummary(tasks) {
      const durations = tasks.map((task) => taskDuration(task).trim()).filter(Boolean);
      if (!durations.length) {
        return '<span class="summary-chip">汇总时长：未填写</span>';
      }

      const parsed = durations.map(parseDuration);
      const minutes = parsed.reduce((sum, item) => sum + item.minutes, 0);
      const unknown = parsed.filter((item) => !item.parsed).map((item) => item.text);
      const parts = [];

      if (minutes > 0) {
        parts.push(`可计算 ${formatMinutes(minutes)}`);
      }

      if (unknown.length) {
        parts.push(`其他 ${unknown.map(escapeHtml).join("、")}`);
      }

      return `<span class="summary-chip">汇总时长：${parts.join(" + ")}</span>`;
    }

    function parseDuration(text) {
      const normalized = text.replace(/\s+/g, "").toLowerCase();
      let minutes = 0;
      let parsed = false;
      const hourMatch = normalized.match(/(\d+(?:\.\d+)?)(?:小时|小時|h|hr|hrs)/);
      const minuteMatch = normalized.match(/(\d+(?:\.\d+)?)(?:分钟|分鐘|分|min|mins|m)/);

      if (hourMatch) {
        minutes += Number(hourMatch[1]) * 60;
        parsed = true;
      }

      if (minuteMatch) {
        minutes += Number(minuteMatch[1]);
        parsed = true;
      }

      if (!parsed && /^\d+(?:\.\d+)?$/.test(normalized)) {
        minutes += Number(normalized);
        parsed = true;
      }

      return { text, minutes, parsed };
    }

    function formatMinutes(minutes) {
      const rounded = Math.round(minutes);
      const hours = Math.floor(rounded / 60);
      const rest = rounded % 60;

      if (!hours) return `${rest} 分钟`;
      if (!rest) return `${hours} 小时`;
      return `${hours} 小时 ${rest} 分钟`;
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      data.tasks.unshift({
        id: makeId(),
        text,
        type: currentType,
        date: currentType === "once" ? selectedDate : undefined,
        createdAt: selectedDate,
        duration: durationInput.value.trim(),
        amount: amountInput.value.trim()
      });

      input.value = "";
      durationInput.value = "";
      amountInput.value = "";
      setActiveFilter("all");
      save();
      render();
    });

    list.addEventListener("click", (event) => {
      const item = event.target.closest(".todo");
      if (!item) return;

      if (event.target.classList.contains("check")) {
        setDone(item.dataset.id, selectedDate, !isDone({ id: item.dataset.id }, selectedDate));
      }

      if (event.target.classList.contains("delete")) {
        data.tasks = data.tasks.filter((todo) => todo.id !== item.dataset.id);
        Object.values(data.completions).forEach((completionMap) => delete completionMap[item.dataset.id]);
      }

      save();
      render();
    });

    confirmDay.addEventListener("click", () => {
      confirmDate(selectedDate);
      save();
      render();
    });

    selectedDateInput.addEventListener("change", () => {
      selectedDate = selectedDateInput.value || todayKey;
      selectedDateInput.value = selectedDate;
      render();
    });

    goToday.addEventListener("click", () => {
      selectedDate = todayKey;
      selectedDateInput.value = selectedDate;
      render();
    });

    typeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        currentType = button.dataset.type;
        typeButtons.forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        typeHint.textContent = currentType === "daily"
          ? "每天重复任务会出现在每一天，完成状态按日期单独记录。"
          : "当天任务只会显示在当前选择的日期。";
        input.placeholder = currentType === "daily" ? "例如：喝水、运动、背单词..." : "例如：提交报告、买菜、预约...";
        input.focus();
      });
    });

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setActiveFilter(button.dataset.filter);
        render();
      });
    });

    clearDone.addEventListener("click", () => {
      tasksForDate(selectedDate).forEach((task) => setDone(task.id, selectedDate, false));
      save();
      render();
    });

    save();
    render();
  </script>
</body>
</html>
